<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>City Flash Flooding Dashboard</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      background: #111;
    }

    #controls {
      position: absolute;
      top: 58px;
      left: 58px;
      z-index: 1000;
      background: rgba(20,20,20,0.92);
      color: white;
      padding: 14px 14px 12px 14px;
      border-radius: 10px;
      font-family: Arial, sans-serif;
      width: 315px;
      box-sizing: border-box;
      box-shadow: 0 2px 12px rgba(0,0,0,0.45);
    }

    #controls h3 {
      margin: 0 0 12px 0;
      font-size: 18px;
      line-height: 1.2;
    }

    #controls label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      margin-top: 9px;
      margin-bottom: 4px;
    }

    select, input {
      width: 100%;
      box-sizing: border-box;
      padding: 4px;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #ddd;
    }

    #legend {
      position: absolute;
      right: 18px;
      bottom: 30px;
      z-index: 1000;
      width: 292px;
      box-sizing: border-box;
      background: rgba(20,20,20,0.92);
      color: white;
      padding: 12px 14px;
      border-radius: 10px;
      font-family: Arial, sans-serif;
      box-shadow: 0 2px 12px rgba(0,0,0,0.45);
    }

    #legend-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 3px;
    }

    #legend-metric {
      font-size: 12px;
      color: #ddd;
      margin-bottom: 8px;
      line-height: 1.25;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      margin: 5px 0;
    }

    .legend-swatch {
      width: 17px;
      height: 17px;
      border-radius: 50%;
      border: 1px solid #111;
      flex: 0 0 17px;
      box-sizing: border-box;
    }

    .legend-note {
      margin-top: 8px;
      font-size: 11px;
      line-height: 1.25;
      color: #ccc;
    }

    .flash-popup {
      font-size: 15px;
      line-height: 1.35;
    }

    .flash-popup b {
      font-weight: 700;
    }

    .flash-popup hr {
      margin: 9px 0;
    }

    .flash-popup .rain-window-note {
      margin-top: 8px;
      font-size: 13px;
      color: #555;
      line-height: 1.25;
    }

    .leaflet-popup-content {
      font-size: 15px;
    }

    .leaflet-top.leaflet-left {
      top: 8px;
      left: 8px;
    }
  </style>
</head>

<body>

<div id="controls">
  <h3>City Flash Flooding</h3>

  <label>Metric</label>
  <select id="metric">
    <option value="nearest_max_15min_in">Nearest Max 15-min</option>
    <option value="nearest_max_30min_in">Nearest Max 30-min</option>
    <option value="nearest_max_60min_in" selected>Nearest Max 60-min</option>
    <option value="nearest_max_180min_in">Nearest Max 180-min</option>
    <option value="nearest_event_total_in">Nearest Event Total</option>
    <option value="nearest_peak_rain_rate_inhr">Nearest Peak Instantaneous Rate</option>
    <option value="max_60min_within_5mi_in">Max 60-min Within 5 mi</option>
    <option value="max_180min_within_5mi_in">Max 180-min Within 5 mi</option>
    <option value="max_total_within_5mi_in">Max Total Within 5 mi</option>
  </select>

  <label>Minimum Coverage %</label>
  <input type="number" id="coverage" value="80" min="0" max="110">

  <label>Event Date</label>
  <select id="eventDate">
    <option value="all">All event dates</option>
  </select>

  <div id="status">Loading data...</div>
</div>

<div id="legend">
  <div id="legend-title">PDS-based rainfall scale</div>
  <div id="legend-metric">Dot color is based on the selected metric.</div>
  <div id="legend-rows"></div>
  <div class="legend-note">Bins use NOAA Atlas 14/PDS recurrence estimates near New Orleans. Duration metrics use actual rainfall amount in that duration; peak instantaneous rate uses inches/hour.</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([29.95, -90.1], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let eventsLayer;
let eventData;

const FIXED_DOT_RADIUS = 8;

const PDS_COLORS = {
  lt1: '#2c7bb6',
  y1: '#74add1',
  y2: '#abd9e9',
  y5: '#ffffbf',
  y10: '#fdae61',
  y25: '#f46d43',
  y50: '#d73027',
  y100: '#a50026',
  y500: '#7b3294'
};

const PDS_THRESHOLDS = {
  nearest_max_15min_in: [
    { min: -Infinity, max: 0.98, color: PDS_COLORS.lt1, label: '< 1-yr (<0.98")' },
    { min: 0.98, max: 1.12, color: PDS_COLORS.y1, label: '1–2 yr (0.98–1.11")' },
    { min: 1.12, max: 1.35, color: PDS_COLORS.y2, label: '2–5 yr (1.12–1.34")' },
    { min: 1.35, max: 1.55, color: PDS_COLORS.y5, label: '5–10 yr (1.35–1.54")' },
    { min: 1.55, max: 1.84, color: PDS_COLORS.y10, label: '10–25 yr (1.55–1.83")' },
    { min: 1.84, max: 2.08, color: PDS_COLORS.y25, label: '25–50 yr (1.84–2.07")' },
    { min: 2.08, max: 2.32, color: PDS_COLORS.y50, label: '50–100 yr (2.08–2.31")' },
    { min: 2.32, max: 2.94, color: PDS_COLORS.y100, label: '100–500 yr (2.32–2.93")' },
    { min: 2.94, max: Infinity, color: PDS_COLORS.y500, label: '≥500 yr (≥2.94")' }
  ],
  nearest_max_30min_in: [
    { min: -Infinity, max: 1.50, color: PDS_COLORS.lt1, label: '< 1-yr (<1.50")' },
    { min: 1.50, max: 1.71, color: PDS_COLORS.y1, label: '1–2 yr (1.50–1.70")' },
    { min: 1.71, max: 2.08, color: PDS_COLORS.y2, label: '2–5 yr (1.71–2.07")' },
    { min: 2.08, max: 2.41, color: PDS_COLORS.y5, label: '5–10 yr (2.08–2.40")' },
    { min: 2.41, max: 2.87, color: PDS_COLORS.y10, label: '10–25 yr (2.41–2.86")' },
    { min: 2.87, max: 3.25, color: PDS_COLORS.y25, label: '25–50 yr (2.87–3.24")' },
    { min: 3.25, max: 3.64, color: PDS_COLORS.y50, label: '50–100 yr (3.25–3.63")' },
    { min: 3.64, max: 4.62, color: PDS_COLORS.y100, label: '100–500 yr (3.64–4.61")' },
    { min: 4.62, max: Infinity, color: PDS_COLORS.y500, label: '≥500 yr (≥4.62")' }
  ],
  nearest_max_60min_in: [
    { min: -Infinity, max: 2.03, color: PDS_COLORS.lt1, label: '< 1-yr (<2.03")' },
    { min: 2.03, max: 2.32, color: PDS_COLORS.y1, label: '1–2 yr (2.03–2.31")' },
    { min: 2.32, max: 2.85, color: PDS_COLORS.y2, label: '2–5 yr (2.32–2.84")' },
    { min: 2.85, max: 3.34, color: PDS_COLORS.y5, label: '5–10 yr (2.85–3.33")' },
    { min: 3.34, max: 4.09, color: PDS_COLORS.y10, label: '10–25 yr (3.34–4.08")' },
    { min: 4.09, max: 4.73, color: PDS_COLORS.y25, label: '25–50 yr (4.09–4.72")' },
    { min: 4.73, max: 5.42, color: PDS_COLORS.y50, label: '50–100 yr (4.73–5.41")' },
    { min: 5.42, max: 7.26, color: PDS_COLORS.y100, label: '100–500 yr (5.42–7.25")' },
    { min: 7.26, max: Infinity, color: PDS_COLORS.y500, label: '≥500 yr (≥7.26")' }
  ],
  nearest_max_180min_in: [
    { min: -Infinity, max: 2.91, color: PDS_COLORS.lt1, label: '< 1-yr (<2.91")' },
    { min: 2.91, max: 3.31, color: PDS_COLORS.y1, label: '1–2 yr (2.91–3.30")' },
    { min: 3.31, max: 4.10, color: PDS_COLORS.y2, label: '2–5 yr (3.31–4.09")' },
    { min: 4.10, max: 4.89, color: PDS_COLORS.y5, label: '5–10 yr (4.10–4.88")' },
    { min: 4.89, max: 6.17, color: PDS_COLORS.y10, label: '10–25 yr (4.89–6.16")' },
    { min: 6.17, max: 7.31, color: PDS_COLORS.y25, label: '25–50 yr (6.17–7.30")' },
    { min: 7.31, max: 8.58, color: PDS_COLORS.y50, label: '50–100 yr (7.31–8.57")' },
    { min: 8.58, max: 12.10, color: PDS_COLORS.y100, label: '100–500 yr (8.58–12.09")' },
    { min: 12.10, max: Infinity, color: PDS_COLORS.y500, label: '≥500 yr (≥12.10")' }
  ],
  nearest_event_total_in: [
    { min: -Infinity, max: 2.91, color: PDS_COLORS.lt1, label: '< 1-yr 3-hr (<2.91")' },
    { min: 2.91, max: 3.31, color: PDS_COLORS.y1, label: '1–2 yr 3-hr (2.91–3.30")' },
    { min: 3.31, max: 4.10, color: PDS_COLORS.y2, label: '2–5 yr 3-hr (3.31–4.09")' },
    { min: 4.10, max: 4.89, color: PDS_COLORS.y5, label: '5–10 yr 3-hr (4.10–4.88")' },
    { min: 4.89, max: 6.17, color: PDS_COLORS.y10, label: '10–25 yr 3-hr (4.89–6.16")' },
    { min: 6.17, max: 7.31, color: PDS_COLORS.y25, label: '25–50 yr 3-hr (6.17–7.30")' },
    { min: 7.31, max: 8.58, color: PDS_COLORS.y50, label: '50–100 yr 3-hr (7.31–8.57")' },
    { min: 8.58, max: 12.10, color: PDS_COLORS.y100, label: '100–500 yr 3-hr (8.58–12.09")' },
    { min: 12.10, max: Infinity, color: PDS_COLORS.y500, label: '≥500 yr 3-hr (≥12.10")' }
  ],
  nearest_peak_rain_rate_inhr: [
    { min: -Infinity, max: 4.0, color: PDS_COLORS.lt1, label: '<4.0"/hr' },
    { min: 4.0, max: 6.0, color: PDS_COLORS.y2, label: '4.0–5.9"/hr' },
    { min: 6.0, max: 8.0, color: PDS_COLORS.y10, label: '6.0–7.9"/hr' },
    { min: 8.0, max: 10.0, color: PDS_COLORS.y50, label: '8.0–9.9"/hr' },
    { min: 10.0, max: Infinity, color: PDS_COLORS.y500, label: '≥10.0"/hr' }
  ]
};

PDS_THRESHOLDS.max_60min_within_5mi_in = PDS_THRESHOLDS.nearest_max_60min_in;
PDS_THRESHOLDS.max_180min_within_5mi_in = PDS_THRESHOLDS.nearest_max_180min_in;
PDS_THRESHOLDS.max_total_within_5mi_in = PDS_THRESHOLDS.nearest_event_total_in;

function num(value) {
  const n = Number(value);
  return Number.isFinite(n) ? n : null;
}

function fmt(value, digits = 2) {
  const n = num(value);
  return n == null ? '' : n.toFixed(digits);
}

function eventDateOnly(value) {
  if (!value) return '';
  return String(value).slice(0, 10);
}

function displayDate(value) {
  if (!value || value === 'all') return 'All event dates';
  const [year, month, day] = value.split('-');
  return `${month}/${day}/${year}`;
}

function rateFromAmount(value, minutes) {
  const n = num(value);
  return n == null ? '' : (n * 60 / minutes).toFixed(2);
}

function amountRateText(value, minutes) {
  const amount = fmt(value, 2);
  const rate = rateFromAmount(value, minutes);
  return amount === '' ? '' : `${amount}" (${rate}"/hr)`;
}

function peakInstantaneousRate(p) {
  return fmt(p.nearest_peak_rain_rate_inhr, 2);
}

function thresholdRows(metric) {
  return PDS_THRESHOLDS[metric] || PDS_THRESHOLDS.nearest_max_60min_in;
}

function colorScale(v, metric) {
  if (v == null) return '#888888';
  const rows = thresholdRows(metric);
  const hit = rows.find(row => v >= row.min && v < row.max);
  return hit ? hit.color : '#888888';
}

function metricLabel() {
  const metricSelect = document.getElementById('metric');
  return metricSelect.options[metricSelect.selectedIndex].text;
}

function featureHasUsableRainData(feature) {
  const p = feature.properties;
  return (num(p.usable_stations) ?? 0) > 0 && num(p.nearest_coverage_pct) != null;
}

function populateDateDropdown(data) {
  const select = document.getElementById('eventDate');
  const dates = [...new Set(
    data.features
      .filter(featureHasUsableRainData)
      .map(f => eventDateOnly(f.properties.event_datetime))
      .filter(Boolean)
  )].sort();

  select.innerHTML = '<option value="all">All event dates</option>' + dates.map(date => {
    const count = data.features.filter(f => featureHasUsableRainData(f) && eventDateOnly(f.properties.event_datetime) === date).length;
    return `<option value="${date}">${displayDate(date)} (${count})</option>`;
  }).join('');
}

function updateLegend() {
  const metric = document.getElementById('metric').value;
  const rows = thresholdRows(metric);
  document.getElementById('legend-metric').textContent = `Selected metric: ${metricLabel()}`;
  document.getElementById('legend-rows').innerHTML = rows.map(row => `
    <div class="legend-row">
      <span class="legend-swatch" style="background:${row.color}"></span>
      <span>${row.label}</span>
    </div>
  `).join('');
}

function render() {
  const metric = document.getElementById('metric').value;
  const minCoverage = Number(document.getElementById('coverage').value);
  const selectedDate = document.getElementById('eventDate').value;

  if (eventsLayer) map.removeLayer(eventsLayer);

  updateLegend();

  let count = 0;
  eventsLayer = L.geoJSON(eventData, {
    filter: f => {
      const p = f.properties;
      const val = num(p[metric]);
      const coverage = num(p.nearest_coverage_pct);
      const usableStations = num(p.usable_stations);
      const matchesDate = selectedDate === 'all' || eventDateOnly(p.event_datetime) === selectedDate;

      return val != null &&
        (usableStations ?? 0) > 0 &&
        (coverage ?? 0) >= minCoverage &&
        matchesDate;
    },
    pointToLayer: (feature, latlng) => {
      count += 1;
      const val = num(feature.properties[metric]);
      return L.circleMarker(latlng, {
        radius: FIXED_DOT_RADIUS,
        color: '#111',
        weight: 1,
        fillColor: colorScale(val, metric),
        fillOpacity: 0.85
      });
    },
    onEachFeature: (feature, layer) => {
      const p = feature.properties;
      layer.bindPopup(`
        <div class="flash-popup">
          <b>Date:</b> ${p.event_datetime ?? ''}<br>
          <b>Nearest Station:</b> ${p.nearest_station_name ?? ''}<br>
          <b>Distance:</b> ${p.nearest_station_distance_mi ?? ''} mi<br>
          <b>Confidence:</b> ${p.nearest_station_confidence ?? ''}<br>
          <hr>
          <b>Nearest 15-min:</b> ${amountRateText(p.nearest_max_15min_in, 15)}<br>
          <b>Nearest 30-min:</b> ${amountRateText(p.nearest_max_30min_in, 30)}<br>
          <b>Nearest 60-min:</b> ${fmt(p.nearest_max_60min_in, 2)}"<br>
          <b>Nearest 180-min:</b> ${fmt(p.nearest_max_180min_in, 2)}"<br>
          <b>Nearest Total:</b> ${fmt(p.nearest_event_total_in, 2)}"<br>
          <b>Peak instantaneous rate:</b> ${peakInstantaneousRate(p)}"/hr
          <div class="rain-window-note">Rainfall values use the current event-linked WeatherSTEM window. Shared storm-day windows will appear after the next enrichment rebuild.</div>
        </div>
      `);
    }
  }).addTo(map);

  const dateText = selectedDate === 'all' ? '' : ` on ${displayDate(selectedDate)}`;
  document.getElementById('status').textContent = `${count} events with rainfall data displayed${dateText}`;
}

fetch('./data/flash_flood_events.geojson?v=' + Date.now())
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status} loading flash_flood_events.geojson`);
    return r.json();
  })
  .then(data => {
    eventData = data;
    populateDateDropdown(data);
    render();
    document.getElementById('metric').addEventListener('change', render);
    document.getElementById('coverage').addEventListener('change', render);
    document.getElementById('eventDate').addEventListener('change', render);
  })
  .catch(err => {
    console.error(err);
    document.getElementById('status').textContent = `Data load failed: ${err.message}`;
  });
</script>

</body>
</html>
