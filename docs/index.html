<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>City Flash Flooding Dashboard</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      background: #111;
    }

    #controls {
      position: absolute;
      top: 58px;
      left: 58px;
      z-index: 1000;
      background: rgba(20,20,20,0.92);
      color: white;
      padding: 14px 14px 12px 14px;
      border-radius: 10px;
      font-family: Arial, sans-serif;
      width: 285px;
      box-sizing: border-box;
      box-shadow: 0 2px 12px rgba(0,0,0,0.45);
    }

    #controls h3 {
      margin: 0 0 12px 0;
      font-size: 18px;
      line-height: 1.2;
    }

    #controls label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      margin-top: 9px;
      margin-bottom: 4px;
    }

    select, input {
      width: 100%;
      box-sizing: border-box;
      padding: 4px;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #ddd;
    }

    #legend {
      position: absolute;
      right: 18px;
      bottom: 30px;
      z-index: 1000;
      width: 260px;
      box-sizing: border-box;
      background: rgba(20,20,20,0.92);
      color: white;
      padding: 12px 14px;
      border-radius: 10px;
      font-family: Arial, sans-serif;
      box-shadow: 0 2px 12px rgba(0,0,0,0.45);
    }

    #legend-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 3px;
    }

    #legend-metric {
      font-size: 12px;
      color: #ddd;
      margin-bottom: 8px;
      line-height: 1.25;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      margin: 5px 0;
    }

    .legend-swatch {
      width: 17px;
      height: 17px;
      border-radius: 50%;
      border: 1px solid #111;
      flex: 0 0 17px;
      box-sizing: border-box;
    }

    .legend-note {
      margin-top: 8px;
      font-size: 11px;
      line-height: 1.25;
      color: #ccc;
    }

    .leaflet-top.leaflet-left {
      top: 8px;
      left: 8px;
    }
  </style>
</head>

<body>

<div id="controls">
  <h3>City Flash Flooding</h3>

  <label>Metric</label>
  <select id="metric">
    <option value="nearest_max_15min_in">Nearest Max 15-min</option>
    <option value="nearest_max_30min_in">Nearest Max 30-min</option>
    <option value="nearest_max_60min_in" selected>Nearest Max 60-min</option>
    <option value="nearest_max_180min_in">Nearest Max 180-min</option>
    <option value="nearest_event_total_in">Nearest Event Total</option>
    <option value="nearest_peak_rain_rate_inhr">Nearest Peak Instantaneous Rate</option>
    <option value="max_60min_within_5mi_in">Max 60-min Within 5 mi</option>
    <option value="max_180min_within_5mi_in">Max 180-min Within 5 mi</option>
    <option value="max_total_within_5mi_in">Max Total Within 5 mi</option>
  </select>

  <label>Minimum Coverage %</label>
  <input type="number" id="coverage" value="80" min="0" max="110">

  <label>Maximum Distance (mi)</label>
  <input type="number" id="distance" value="5" min="0" max="20" step="0.5">

  <div id="status">Loading data...</div>
</div>

<div id="legend">
  <div id="legend-title">Rainfall color scale</div>
  <div id="legend-metric">Dot color is based on the selected metric.</div>
  <div id="legend-rows"></div>
  <div class="legend-note">Dots are flash flood event locations. Dot size is fixed; events without usable rainfall data for the selected metric are hidden.</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([29.95, -90.1], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let eventsLayer;
let eventData;

const FIXED_DOT_RADIUS = 8;

function num(value) {
  const n = Number(value);
  return Number.isFinite(n) ? n : null;
}

function fmt(value, digits = 2) {
  const n = num(value);
  return n == null ? '' : n.toFixed(digits);
}

function rateFromAmount(value, minutes) {
  const n = num(value);
  return n == null ? '' : (n * 60 / minutes).toFixed(2);
}

function amountRateText(value, minutes) {
  const amount = fmt(value, 2);
  const rate = rateFromAmount(value, minutes);
  return amount === '' ? '' : `${amount}" (${rate}"/hr)`;
}

function peakInstantaneousRate(p) {
  return fmt(p.nearest_peak_rain_rate_inhr, 2);
}

function colorScale(v) {
  if (v == null) return '#888888';
  if (v >= 4) return '#d7191c';
  if (v >= 2) return '#fdae61';
  if (v >= 1) return '#abd9e9';
  return '#2c7bb6';
}

function metricLabel() {
  const metricSelect = document.getElementById('metric');
  return metricSelect.options[metricSelect.selectedIndex].text;
}

function metricUnit() {
  const metric = document.getElementById('metric').value;
  return metric.includes('inhr') ? '"/hr' : '"';
}

function updateLegend() {
  const unit = metricUnit();
  const rows = [
    { color: '#2c7bb6', label: `< 1.00${unit}` },
    { color: '#abd9e9', label: `1.00–1.99${unit}` },
    { color: '#fdae61', label: `2.00–3.99${unit}` },
    { color: '#d7191c', label: `≥ 4.00${unit}` }
  ];

  document.getElementById('legend-metric').textContent = `Selected metric: ${metricLabel()}`;
  document.getElementById('legend-rows').innerHTML = rows.map(row => `
    <div class="legend-row">
      <span class="legend-swatch" style="background:${row.color}"></span>
      <span>${row.label}</span>
    </div>
  `).join('');
}

function render() {
  const metric = document.getElementById('metric').value;
  const minCoverage = Number(document.getElementById('coverage').value);
  const maxDistance = Number(document.getElementById('distance').value);

  if (eventsLayer) map.removeLayer(eventsLayer);

  updateLegend();

  let count = 0;
  eventsLayer = L.geoJSON(eventData, {
    filter: f => {
      const p = f.properties;
      const val = num(p[metric]);
      const coverage = num(p.nearest_coverage_pct);
      const distance = num(p.nearest_station_distance_mi);
      const usableStations = num(p.usable_stations);

      return val != null &&
        (usableStations ?? 0) > 0 &&
        (coverage ?? 0) >= minCoverage &&
        (distance ?? 999) <= maxDistance;
    },
    pointToLayer: (feature, latlng) => {
      count += 1;
      const val = num(feature.properties[metric]);
      return L.circleMarker(latlng, {
        radius: FIXED_DOT_RADIUS,
        color: '#111',
        weight: 1,
        fillColor: colorScale(val),
        fillOpacity: 0.85
      });
    },
    onEachFeature: (feature, layer) => {
      const p = feature.properties;
      layer.bindPopup(`
        <b>Event ID:</b> ${p.event_id ?? ''}<br>
        <b>Date:</b> ${p.event_datetime ?? ''}<br>
        <b>Parish:</b> ${p.event_parish ?? ''}<br>
        <b>Nearest Station:</b> ${p.nearest_station_name ?? ''}<br>
        <b>Distance:</b> ${p.nearest_station_distance_mi ?? ''} mi<br>
        <b>Confidence:</b> ${p.nearest_station_confidence ?? ''}<br>
        <b>Coverage:</b> ${p.nearest_coverage_pct ?? ''}%<br>
        <hr>
        <b>Nearest 15-min:</b> ${amountRateText(p.nearest_max_15min_in, 15)}<br>
        <b>Nearest 30-min:</b> ${amountRateText(p.nearest_max_30min_in, 30)}<br>
        <b>Nearest 60-min:</b> ${fmt(p.nearest_max_60min_in, 2)}"<br>
        <b>Nearest 180-min:</b> ${fmt(p.nearest_max_180min_in, 2)}"<br>
        <b>Nearest Total:</b> ${fmt(p.nearest_event_total_in, 2)}"<br>
        <b>Peak instantaneous rate:</b> ${peakInstantaneousRate(p)}"/hr
      `);
    }
  }).addTo(map);

  document.getElementById('status').textContent = `${count} events with rainfall data displayed`;
}

fetch('./data/flash_flood_events.geojson?v=' + Date.now())
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status} loading flash_flood_events.geojson`);
    return r.json();
  })
  .then(data => {
    eventData = data;
    render();
    document.getElementById('metric').addEventListener('change', render);
    document.getElementById('coverage').addEventListener('change', render);
    document.getElementById('distance').addEventListener('input', render);
  })
  .catch(err => {
    console.error(err);
    document.getElementById('status').textContent = `Data load failed: ${err.message}`;
  });
</script>

</body>
</html>
